<svg viewBox="0 0 780 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Backend layers: layer_2 BFF, layer_3 usecases, layer_4 entities, layer_1 persistence</title>
  <desc>Request flow: the page calls the BFF (layer_2), which executes usecases (layer_3), which operate entities (layer_4), the only place allowed to use ctx.data, persisting in layer_1 (tables, metrics and MDM references). Layer numbering is not the call order.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8a8a"/>
    </marker>
    <marker id="arrAcc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="600" fill="#ffffff"/>

  <!-- Page (outside the backend) -->
  <rect x="60" y="18" width="540" height="44" rx="8" fill="none" stroke="#cfcfcf" stroke-dasharray="5 4"/>
  <text x="78" y="45" font-size="14" font-weight="600" fill="#333333">Page (frontend)</text>
  <text x="586" y="45" font-size="11.5" text-anchor="end" fill="#8a8a8a">outside the backend — talks only to the BFF</text>

  <line x1="330" y1="62" x2="330" y2="92" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="342" y="82" font-size="11" fill="#8a8a8a">BFF command</text>

  <!-- layer_2 -->
  <rect x="60" y="94" width="540" height="76" rx="8" fill="none" stroke="#cfcfcf" stroke-width="1.4"/>
  <text x="78" y="119" font-size="14" font-weight="700" fill="#333333">layer_2_controllers</text>
  <text x="78" y="137" font-size="11.5" fill="#8a8a8a">BFF — receives the request</text>
  <text x="330" y="119" font-size="12" fill="#333333">• validates the page input</text>
  <text x="330" y="137" font-size="12" fill="#333333">• calls usecases by usecaseId</text>
  <text x="330" y="155" font-size="12" fill="#333333">• never touches a table</text>

  <line x1="330" y1="170" x2="330" y2="200" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="342" y="190" font-size="11" fill="#8a8a8a">executes usecase</text>

  <!-- layer_3 -->
  <rect x="60" y="202" width="540" height="86" rx="8" fill="none" stroke="#cfcfcf" stroke-width="1.4"/>
  <text x="78" y="227" font-size="14" font-weight="700" fill="#333333">layer_3_usecases</text>
  <text x="78" y="245" font-size="11.5" fill="#8a8a8a">decides WHAT happens</text>
  <text x="330" y="227" font-size="12" fill="#333333">• business rules and validations</text>
  <text x="330" y="245" font-size="12" fill="#333333">• state transitions</text>
  <text x="330" y="263" font-size="12" fill="#333333">• orchestrates entities + transactions</text>
  <text x="330" y="281" font-size="12" fill="#8a8a8a">knows nothing about columns or JSONB</text>

  <line x1="330" y1="288" x2="330" y2="318" stroke="#2563eb" stroke-width="1.4" marker-end="url(#arrAcc)"/>
  <text x="342" y="308" font-size="11" fill="#2563eb">import { DealEntity, IDealEntity }</text>

  <!-- exception L2 -> L4 -->
  <path d="M 600 132 H 668 V 364 H 608" fill="none" stroke="#8a8a8a" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="676" y="240" font-size="10.5" fill="#8a8a8a">exception</text>
  <text x="676" y="254" font-size="10.5" fill="#8a8a8a">(phase 2):</text>
  <text x="676" y="268" font-size="10.5" fill="#8a8a8a">trivial</text>
  <text x="676" y="282" font-size="10.5" fill="#8a8a8a">read, no</text>
  <text x="676" y="296" font-size="10.5" fill="#8a8a8a">rules</text>

  <!-- layer_4 (highlight) -->
  <rect x="60" y="320" width="540" height="104" rx="8" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="78" y="345" font-size="14" font-weight="700" fill="#2563eb">layer_4_entities</text>
  <text x="78" y="363" font-size="11.5" fill="#8a8a8a">knows HOW to operate the table</text>
  <text x="78" y="395" font-size="11.5" font-weight="600" fill="#2563eb">ctx.data.* exists ONLY here</text>
  <text x="78" y="411" font-size="10.5" fill="#8a8a8a">(grep-verifiable rule)</text>
  <text x="330" y="345" font-size="12" fill="#333333">• TS contract + implementation ({Entity}.ts)</text>
  <text x="330" y="363" font-size="12" fill="#333333">• column vs details (JSONB)</text>
  <text x="330" y="381" font-size="12" fill="#333333">• resolves MDM refs (102034)</text>
  <text x="330" y="399" font-size="12" fill="#333333">• writes metric tables</text>
  <text x="330" y="417" font-size="12" fill="#333333">• semantic operations (advanceStage, archive)</text>

  <line x1="330" y1="424" x2="330" y2="454" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="342" y="444" font-size="11" fill="#8a8a8a">ctx.data.*</text>

  <!-- layer_1 -->
  <rect x="60" y="456" width="540" height="104" rx="8" fill="none" stroke="#cfcfcf" stroke-width="1.4"/>
  <text x="78" y="481" font-size="14" font-weight="700" fill="#333333">layer_1_external</text>
  <text x="78" y="499" font-size="11.5" fill="#8a8a8a">WHERE it persists</text>
  <text x="330" y="481" font-size="12" fill="#333333">• transactional tables (generateTable: true)</text>
  <text x="330" y="499" font-size="12" fill="#333333">• metric tables (TimescaleDB)</text>
  <text x="330" y="517" font-size="12" fill="#333333">• MDM refs: shape only (generateTable: false)</text>
  <text x="330" y="535" font-size="12" fill="#8a8a8a">MDM data lives in project 102034</text>
  <text x="78" y="535" font-size="10.5" fill="#8a8a8a">swappable implementation:</text>
  <text x="78" y="549" font-size="10.5" fill="#8a8a8a">Postgres · Dynamo · Memory</text>

  <text x="60" y="586" font-size="11" fill="#8a8a8a">Layer numbering is not the call order — a request flows 2 → 3 → 4 → 1.</text>
</svg>
